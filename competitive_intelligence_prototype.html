<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IntelliTrack — Competitive Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f0f0;background-attachment:fixed;min-height:100vh;color:#1a1a1a;overflow:hidden}
:root{--white:#fff;--dark:#111827;--purple:#E84520;--pink:#ec4899;--blue:#3b82f6;--green:#10b981;--orange:#f97316;--red:#ef4444;--gray:#6b7280;--shadow:0 2px 16px rgba(0,0,0,.06);--shadow-lg:0 6px 32px rgba(0,0,0,.11);--r:18px;--r-sm:12px}
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:72px;background:var(--white);border-radius:0 24px 24px 0;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:6px;z-index:100;flex-shrink:0}
.s-logo{width:40px;height:40px;background:var(--purple);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-family:'Inter',sans-serif;font-weight:800;font-size:12px;color:#fff;letter-spacing:-.5px;cursor:pointer}
.s-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--gray);position:relative;border:none;background:transparent}
.s-icon:hover{background:#FEF0EC;color:var(--purple)}
.s-icon.active{background:var(--purple);color:#fff}
.s-badge{position:absolute;top:9px;right:9px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid #fff}
.s-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px}
.s-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#E84520,#f97316);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;cursor:pointer}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:22px 26px;position:relative}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
/* TOP NAV */
.top-nav{display:flex;align-items:center;justify-content:center;margin-bottom:28px;position:relative}
.nav-pill{background:var(--dark);border-radius:50px;padding:5px;display:flex;gap:2px;flex-shrink:0}
.np-item{padding:7px 18px;border-radius:40px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.6);white-space:nowrap;border:none;background:transparent;font-family:'Inter',sans-serif}
.np-item:hover{color:rgba(255,255,255,.9)}
.np-item.active{background:#fff;color:var(--dark);font-weight:600}
.nav-right{display:flex;align-items:center;gap:10px;position:absolute;right:0}
.icon-btn{width:38px;height:38px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);border:none;color:var(--gray);transition:transform .2s;flex-shrink:0}
.icon-btn:hover{transform:scale(1.06)}
.u-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#E84520,#f97316);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(232,69,32,.3);flex-shrink:0}
/* PAGE */
.page-title{font-family:'Inter',sans-serif;font-size:32px;font-weight:700;color:var(--dark);margin-bottom:20px;letter-spacing:-.3px}
.page-enter{animation:pgIn .3s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* CARD */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:22px}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.card-title{font-family:'Inter',sans-serif;font-size:18px;font-weight:600;color:var(--dark)}
.card-sub{font-size:13px;font-weight:400;color:var(--gray);margin-bottom:14px}
.exp-btn{width:30px;height:30px;background:#f5f5f5;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:var(--gray);flex-shrink:0}
.exp-btn:hover{background:#eee}
/* DASHBOARD GRID */
.dash-grid{display:grid;grid-template-columns:360px 1fr;gap:18px}
.col-left{grid-row:1/3;display:flex;flex-direction:column;gap:18px}
/* SEARCH */
.search-bar{display:flex;align-items:center;gap:8px;background:#f8f8f8;border-radius:12px;padding:9px 13px;margin-bottom:14px}
.search-bar input{flex:1;border:none;background:transparent;font-family:'Inter',sans-serif;font-size:13px;color:var(--dark);outline:none}
.search-bar input::placeholder{color:var(--gray)}
.search-btn{width:32px;height:32px;background:var(--dark);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0}
/* COMPETITOR ITEM */
.comp-item{border-radius:16px;padding:15px;cursor:pointer;transition:all .2s;animation:itemIn .3s ease both}
@keyframes itemIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.comp-item:hover{transform:translateX(3px);filter:brightness(.97)}
.comp-item-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.comp-name{font-family:'Inter',sans-serif;font-size:15px;font-weight:600;color:var(--dark)}
.comp-desc{font-size:13px;font-weight:400;color:#555;line-height:1.4;margin-bottom:10px}
.comp-footer{display:flex;align-items:center;justify-content:space-between}
.comp-date{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--gray)}
.av-group{display:flex}
.av-mini{width:24px;height:24px;border-radius:50%;border:2px solid #fff;background:var(--dark);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:-7px}
.av-mini:first-child{margin-left:0}
.threat-badge{padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600}
.t-high{background:#fce7e7;color:#c62828}
.t-med{background:#fff3cd;color:#e65100}
.t-low{background:#e8f5e9;color:#2e7d32}
/* CHART */
.chart-legend{display:flex;gap:14px;margin-bottom:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--gray)}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chart-toggle{display:flex;align-items:center;background:#f5f5f5;border-radius:8px;padding:3px}
.ct-btn{padding:4px 11px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s;color:var(--gray);border:none;background:transparent;font-family:'Inter',sans-serif}
.ct-btn.active{background:#fff;color:var(--dark);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
/* BOTTOM ROW */
.bot-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
/* CHANGE ITEM */
.ch-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0f0}
.ch-item:last-child{border-bottom:none}
.ch-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ch-info{flex:1}
.ch-name{font-size:14px;font-weight:500;color:var(--dark)}
.ch-time{font-size:12px;font-weight:400;color:var(--gray)}
.ch-pct{font-size:13px;font-weight:700;color:var(--dark)}
.conf-bar{width:52px;height:4px;background:#f0f0f0;border-radius:2px;overflow:hidden;margin-top:3px}
.conf-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#E84520,#f97316)}
/* SCORE ITEM */
.sc-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:all .15s}
.sc-item:hover{background:#f8f8f8;margin:0 -8px;padding:9px 8px;border-radius:10px}
.sc-item:last-child{border-bottom:none}
.sc-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sc-info{flex:1}
.sc-name{font-size:14px;font-weight:600;color:var(--dark)}
.sc-meta{font-size:12px;font-weight:400;color:var(--gray)}
.sc-score{font-family:'Inter',sans-serif;font-size:16px;font-weight:700;color:var(--dark)}
/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:var(--r-sm);padding:14px 16px;box-shadow:var(--shadow)}
.stat-num{font-family:'Inter',sans-serif;font-size:26px;font-weight:700;color:var(--dark)}
.stat-lbl{font-size:13px;font-weight:400;color:var(--gray);margin-top:2px}
.stat-chg{font-size:12px;font-weight:600;margin-top:5px}
.up{color:var(--green)}.down{color:var(--red)}
/* FILTER PILLS */
.filter-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.fpill{padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif}
.fpill.active{background:var(--dark);color:#fff}
.fpill:not(.active){background:#fff;color:var(--gray);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fpill:not(.active):hover{background:#FEF0EC;color:var(--purple)}
/* COMPETITOR CARDS PAGE */
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
.comp-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:all .25s}
.comp-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.cc-hdr{padding:18px 18px 14px;display:flex;align-items:center;justify-content:space-between}
.cc-logo{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:18px;font-weight:800;color:#fff}
.cc-info{padding:0 18px 18px}
.cc-name{font-family:'Inter',sans-serif;font-size:16px;font-weight:600;color:var(--dark);margin-bottom:3px}
.cc-domain{font-size:13px;font-weight:400;color:var(--gray);margin-bottom:12px}
.mb-item{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.mb-lbl{width:48px;font-size:12px;font-weight:400;color:var(--gray)}
.mb-track{flex:1;height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.mb-fill{height:100%;border-radius:3px}
.mb-val{width:28px;font-size:12px;font-weight:600;color:var(--dark);text-align:right}
/* ALERTS */
.alerts-list{display:flex;flex-direction:column;gap:11px}
.al-card{background:#fff;border-radius:var(--r-sm);box-shadow:var(--shadow);padding:14px 18px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:all .2s;border-left:4px solid transparent}
.al-card:hover{transform:translateX(4px)}
.al-critical{border-left-color:var(--red)}
.al-high{border-left-color:var(--orange)}
.al-medium{border-left-color:#eab308}
.al-low{border-left-color:var(--green)}
.al-sev{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.sev-critical{background:#fee2e2}.sev-high{background:#ffedd5}.sev-medium{background:#fef9c3}.sev-low{background:#dcfce7}
.al-content{flex:1}
.al-title{font-size:14px;font-weight:600;color:var(--dark);margin-bottom:3px}
.al-desc{font-size:14px;font-weight:400;color:var(--gray);line-height:1.5}
.al-meta{font-size:12px;font-weight:400;color:var(--gray);margin-top:5px;display:flex;align-items:center;gap:8px}
/* REPORTS */
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
.rep-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:22px;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;gap:10px}
.rep-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.rep-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px}
.rep-title{font-family:'Inter',sans-serif;font-size:16px;font-weight:600;color:var(--dark)}
.rep-meta{font-size:13px;font-weight:400;color:var(--gray)}
.rep-status{padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:600;width:fit-content}
.status-ready{background:#dcfce7;color:#166534}
.status-gen{background:#fef9c3;color:#854d0e;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.rep-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:10px;border-top:1px solid #f5f5f5}
.rep-dl{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:var(--purple);cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif}
.rep-dl:hover{text-decoration:underline}
/* SETTINGS */
.set-section{margin-bottom:28px}
.set-title{font-family:'Inter',sans-serif;font-size:16px;font-weight:600;margin-bottom:14px;color:var(--dark)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid #f0f0f0}
.set-row:last-child{border-bottom:none}
.set-row-label{font-size:14px;font-weight:500;color:var(--dark)}
.set-row-desc{font-size:13px;font-weight:400;color:var(--gray);margin-top:2px}
.toggle{width:42px;height:23px;border-radius:12px;background:#e5e7eb;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:var(--purple)}
.toggle::after{content:'';position:absolute;width:17px;height:17px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{transform:translateX(19px)}
.intg-card{background:#fff;border-radius:var(--r-sm);box-shadow:var(--shadow);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.intg-logo{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.intg-info{flex:1}
.intg-name{font-size:14px;font-weight:600;color:var(--dark)}
.intg-status{font-size:13px;font-weight:400;color:var(--gray)}
.btn-connect{padding:6px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s}
.btn-connected{background:#dcfce7;color:#166534}
.btn-disconnected{background:var(--dark);color:#fff}
.btn-disconnected:hover{background:#374151}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(5px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:#fff;border-radius:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:28px;animation:slideUp .3s ease}
.modal-box::-webkit-scrollbar{display:none}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-family:'Inter',sans-serif;font-size:20px;font-weight:600;color:var(--dark)}
.close-btn{width:32px;height:32px;border-radius:50%;background:#f5f5f5;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray)}
.close-btn:hover{background:#eee}
.input-field{width:100%;padding:11px 14px;border:2px solid #f0f0f0;border-radius:11px;font-family:'Inter',sans-serif;font-size:13.5px;color:var(--dark);outline:none;transition:border-color .2s;margin-bottom:12px}
.input-field:focus{border-color:var(--purple)}
.input-label{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:5px;display:block}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn-primary{flex:1;background:var(--dark);color:#fff;border:none;border-radius:11px;padding:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary:hover{background:#374151}
.btn-secondary{flex:1;background:#f5f5f5;color:var(--dark);border:none;border-radius:11px;padding:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer}
/* INTEL PAGE */
.intel-tabs{display:flex;gap:3px;background:#f5f5f5;border-radius:12px;padding:4px;margin-bottom:18px;width:fit-content}
.i-tab{padding:7px 16px;border-radius:9px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--gray);font-family:'Inter',sans-serif;transition:all .15s}
.i-tab.active{background:#fff;color:var(--dark);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:18px}
.kpi-card{background:#fff;border-radius:var(--r-sm);padding:14px;box-shadow:var(--shadow)}
.kpi-lbl{font-size:13px;font-weight:400;color:var(--gray);margin-bottom:3px}
.kpi-val{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:var(--dark)}
.kpi-chg{font-size:12px;margin-top:3px;font-weight:500}
.data-table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--shadow)}
.data-table th{background:#f8f8f8;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--gray);border-bottom:1px solid #f0f0f0}
.data-table td{padding:11px 14px;font-size:14px;font-weight:400;border-bottom:1px solid #f8f8f8;color:var(--dark)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#fafafa}
.trend-up{color:var(--green);font-weight:600}
.trend-down{color:var(--red);font-weight:600}
/* MOBILE NAV */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;box-shadow:0 -4px 20px rgba(0,0,0,.1);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:1000}
.mob-nav-items{display:flex;justify-content:space-around}
.mob-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;cursor:pointer;color:var(--gray);border:none;background:transparent;font-family:'Inter',sans-serif;font-size:10px;transition:color .2s}
.mob-nav-item.active{color:var(--purple)}
/* ADD BTN */
.add-btn{width:100%;padding:10px;border:2px dashed #d1d5db;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:12.5px;color:var(--gray);cursor:pointer;transition:all .2s;background:transparent;font-family:'Inter',sans-serif;margin-top:7px}
.add-btn:hover{border-color:var(--purple);color:var(--purple);background:#FEF0EC}
/* ── COMPETITOR PROFILE PAGE ── */
.cp-hero{border-radius:var(--r);overflow:hidden;margin-bottom:20px;position:relative}
.cp-hero-banner{height:120px;position:relative;display:flex;align-items:flex-end;padding:0 28px 20px}
.cp-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.18))}
.cp-hero-body{padding:0 28px 24px;background:#fff;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.cp-logo-wrap{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:24px;font-weight:800;color:#fff;box-shadow:var(--shadow);flex-shrink:0;margin-top:-32px;border:3px solid #fff}
.cp-hero-info{flex:1}
.cp-hero-name{font-family:'Inter',sans-serif;font-size:24px;font-weight:700;color:var(--dark);margin-bottom:3px}
.cp-hero-domain{font-size:14px;font-weight:400;color:var(--gray)}
.cp-hero-actions{display:flex;gap:10px;align-items:center}
.cp-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.cp-metric-card{background:#fff;border-radius:var(--r-sm);padding:16px;box-shadow:var(--shadow);text-align:center}
.cp-metric-icon{font-size:20px;margin-bottom:6px}
.cp-metric-val{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:var(--dark)}
.cp-metric-lbl{font-size:13px;font-weight:400;color:var(--gray);margin-top:3px}
.cp-body{display:grid;grid-template-columns:1fr 380px;gap:20px}
/* Activity section */
.act-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.act-fpill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s}
.act-category-group{margin-bottom:18px}

const filterActivities = (items, rangeDays) => {
  if(!rangeDays || rangeDays >= 365) return items;
  return items.filter(a => {
    const t = a.time;
    if(t.includes('h ago')) return true;
    const n = parseFloat(t) || 0;
    if(t.includes('d ago')) return n <= rangeDays;
    if(t.includes('w ago')) return n * 7 <= rangeDays;
    return true;
  });
};

/* ── SVG LINE CHART ── */
const LineChart = ({ data }) => {
  const [hov, setHov] = useState(null);
  const W=560,H=170,PL=32,PR=16,PT=18,PB=26;
  const cW=W-PL-PR,cH=H-PT-PB;
  const allV=[...data.seo,...data.social,...data.ads];
  const maxV=Math.max(...allV),minV=Math.min(...allV)-5;
  const range=maxV-minV||1;
  const xStep=cW/(data.labels.length-1);
  const toX=i=>PL+i*xStep;
  const toY=v=>PT+cH-((v-minV)/range)*cH;
  const mkPath=vals=>{
    const pts=vals.map((v,i)=>({x:toX(i),y:toY(v)}));
    let d=`M ${pts[0].x} ${pts[0].y}`;
    for(let i=1;i<pts.length;i++){
      const cp1x=pts[i-1].x+(pts[i].x-pts[i-1].x)*.4;
      const cp2x=pts[i].x-(pts[i].x-pts[i-1].x)*.4;
      d+=` C ${cp1x} ${pts[i-1].y} ${cp2x} ${pts[i].y} ${pts[i].x} ${pts[i].y}`;
    }
    return d;
  };
  const mkArea=vals=>{
    const p=mkPath(vals);
    const pts=vals.map((v,i)=>({x:toX(i),y:toY(v)}));
    return `${p} L ${pts[pts.length-1].x} ${PT+cH} L ${pts[0].x} ${PT+cH} Z`;
  };
  const lines=[{k:'seo',vals:data.seo,col:'#E84520',lbl:'SEO'},{k:'soc',vals:data.social,col:'#ec4899',lbl:'Social'},{k:'ads',vals:data.ads,col:'#3b82f6',lbl:'Ads'}];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',overflow:'visible'}}>
      <defs>{lines.map(l=><linearGradient key={l.k} id={`g-${l.k}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={l.col} stopOpacity=".18"/><stop offset="100%" stopColor={l.col} stopOpacity=".02"/></linearGradient>)}</defs>
      {[0,25,50,75,100].map(pct=>{const y=PT+cH-(pct/100)*cH;return <line key={pct} x1={PL} y1={y} x2={W-PR} y2={y} stroke="#e5e7eb" strokeWidth="1" strokeDasharray="4 3"/>;
      })}
      {data.labels.map((lbl,i)=><text key={i} x={toX(i)} y={H-5} textAnchor="middle" fontSize="10" fill="#9ca3af" fontFamily="DM Sans">{lbl}</text>)}
      {lines.map(l=><path key={`a${l.k}`} d={mkArea(l.vals)} fill={`url(#g-${l.k})`}/>)}
      {lines.map(l=><path key={`l${l.k}`} d={mkPath(l.vals)} fill="none" stroke={l.col} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>)}
      {hov!==null && lines.map(l=>{const x=toX(hov),y=toY(l.vals[hov]);return <g key={`h${l.k}`}><circle cx={x} cy={y} r="4.5" fill="#fff" stroke={l.col} strokeWidth="2.5"/></g>;})}
      {hov!==null && (()=>{
        const x=toX(hov),tipW=96,tipH=66;
        const tx=Math.min(Math.max(x-tipW/2,PL),W-PR-tipW);
        const ty=PT-tipH-6;
        return <g><rect x={tx} y={ty} width={tipW} height={tipH} rx="8" fill="#1a1a2e" opacity=".92"/><text x={tx+tipW/2} y={ty+14} textAnchor="middle" fontSize="10" fill="#9ca3af" fontFamily="DM Sans">{data.labels[hov]}</text>{lines.map((l,li)=><text key={l.k} x={tx+8} y={ty+28+li*13} fontSize="10" fill={l.col} fontFamily="DM Sans">{l.lbl}: {l.vals[hov]}%</text>)}</g>;
      })()}
      {data.labels.map((_,i)=><rect key={i} x={toX(i)-xStep/2} y={PT} width={xStep} height={cH} fill="transparent" onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)} style={{cursor:'crosshair'}}/>)}
    </svg>
  );
};

/* ── DATE RANGE PICKER ── */
const DateRangePicker = ({range, setRange}) => {
  const [open, setOpen] = useState(false);
  const [showCustom, setShowCustom] = useState(false);
  const [fromDate, setFromDate] = useState('');
  const [toDate, setToDate] = useState('');
  const wrapRef = useRef(null);

  useEffect(() => {
    const handler = e => { if(wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const select = r => { setRange(r); setOpen(false); setShowCustom(false); };

  const applyCustom = () => {
    if(!fromDate || !toDate) return;
    const days = Math.max(1, Math.round((new Date(toDate) - new Date(fromDate)) / 86400000));
    const fmt = d => new Date(d).toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'2-digit'});
    setRange({k:'custom', lbl:`${fmt(fromDate)} – ${fmt(toDate)}`, days});
    setOpen(false); setShowCustom(false);
  };

  const btnLbl = range.lbl || TIME_RANGES.find(r=>r.k===range.k)?.lbl || '7 днів';

  return (
    <div className="drp-wrap" ref={wrapRef}>
      <button className={`drp-btn ${open?'open':''}`} onClick={()=>setOpen(o=>!o)}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span className="drp-btn-lbl">{btnLbl}</span>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      {open && (
        <div className="drp-panel">
          <div className="drp-label">Пресети</div>
          <div className="drp-presets">
            {TIME_RANGES.map(r => (
              <button key={r.k} className={`drp-preset ${range.k===r.k?'active':''}`}
                onClick={()=>select(r)}>{r.lbl}</button>
            ))}
          </div>
          <div className="drp-divider"/>
          <button className={`drp-custom-toggle ${showCustom?'active':''}`}
            onClick={()=>setShowCustom(s=>!s)}>
            Свій діапазон
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points={showCustom?"18 15 12 9 6 15":"6 9 12 15 18 9"}/></svg>
          </button>
          {showCustom && (
            <div className="drp-custom-body">
              <div className="drp-date-row">
                <span className="drp-date-lbl">Від</span>
                <input className="drp-date-input" type="date" value={fromDate} onChange={e=>setFromDate(e.target.value)}/>
              </div>
              <div className="drp-date-row">
                <span className="drp-date-lbl">До</span>
                <input className="drp-date-input" type="date" value={toDate} onChange={e=>setToDate(e.target.value)}/>
              </div>
              <button className="drp-apply" disabled={!fromDate||!toDate||fromDate>toDate} onClick={applyCustom}>
                Застосувати
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const SettingsPage = () => {
  const [toggles,setToggles]=useState({email:true,slack:false,teams:false,weekly:true,pricing:true,features:true,seo:false});
  const tog=k=>setToggles(t=>({...t,[k]:!t[k]}));
  const integrations=[{icon:'💬',name:'Slack',desc:'Get alerts in your Slack workspace',k:'slack'},{icon:'🔵',name:'Microsoft Teams',desc:'Notifications directly in Teams',k:'teams'},{icon:'📧',name:'Email',desc:'Weekly digest + instant alerts',k:'email'},{icon:'🔗',name:'HubSpot',desc:'Sync competitor data to CRM',k:null,connected:false},{icon:'☁️',name:'Salesforce',desc:'Competitive intel in your CRM',k:null,connected:false}];
  return (
    <div className="page-enter">
      <h1 className="page-title">Settings</h1>
      <div style={{maxWidth:600}}>
        <div className="set-section">
          <div className="set-title">Notifications</div>
          <div className="card">
            {[{lbl:'Email Digest',desc:'Receive daily summary via email',k:'email'},{lbl:'Pricing Alerts',desc:'Notify when competitor pricing changes',k:'pricing'},{lbl:'Feature Alerts',desc:'Alert on new competitor features',k:'features'},{lbl:'SEO Monitoring',desc:'Weekly SEO ranking changes',k:'seo'},{lbl:'Weekly Report',desc:'Auto-generate and send weekly digest',k:'weekly'}].map(s=>(
              <div key={s.k} className="set-row">
                <div><div className="set-row-label">{s.lbl}</div><div className="set-row-desc">{s.desc}</div></div>
                <button className={`toggle ${toggles[s.k]?'on':''}`} onClick={()=>tog(s.k)}/>
              </div>
            ))}
          </div>
        </div>
        <div className="set-section">
          <div className="set-title">Integrations</div>
          {integrations.map((intg,i)=>(
            <div key={i} className="intg-card">
              <div className="intg-logo" style={{background:'#f5f5f5'}}>{intg.icon}</div>
              <div className="intg-info">
                <div className="intg-name">{intg.name}</div>
                <div className="intg-status">{intg.k?toggles[intg.k]?'Connected':'Disconnected':intg.connected?'Connected':'Not connected'}</div>
              </div>
              {intg.k ? (
                <button className={`btn-connect ${toggles[intg.k]?'btn-connected':'btn-disconnected'}`} onClick={()=>tog(intg.k)}>{toggles[intg.k]?'Connected':'Connect'}</button>
              ) : (
                <button className="btn-connect btn-disconnected">Connect</button>
              )}
            </div>
          ))}
        </div>
        <div className="set-section">
          <div className="set-title">Plan & Billing</div>
          <div className="card" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:16}}>
            <div>
              <div style={{fontFamily:'Syne',fontSize:18,fontWeight:700,marginBottom:4}}>Professional</div>
              <div style={{fontSize:13,color:'var(--gray)'}}>$499/month · Up to 10 competitors · 5 users</div>
              <div style={{marginTop:8,fontSize:12,color:'var(--green)',fontWeight:600}}>✓ All features included</div>
            </div>
            <button className="btn-primary" style={{padding:'10px 18px',fontSize:13,flexShrink:0}}>Upgrade to Enterprise</button>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── APP ── */
const App = () => {
  const [page, setPage] = useState('dashboard');
  const [compProfile, setCompProfile] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [range, setRange] = useState(TIME_RANGES[1]); // default: 7 днів

  const nav = useCallback(p => {
    setPage(p);
    setCompProfile(null);
  }, []);

  const openComp = useCallback(comp => {
    setCompProfile(comp);
    setPage('competitor-profile');
  }, []);

  const backFromProfile = useCallback(() => {
    setCompProfile(null);
    setPage('competitors');
  }, []);

  return (
    <div className="app">
      <Sidebar page={page} nav={nav}/>
      <div className="main">
        <TopNav page={page} nav={nav} onAdd={()=>setShowAdd(true)} range={range} setRange={setRange}/>
        {page==='dashboard' && <Dashboard onComp={openComp} onAdd={()=>setShowAdd(true)} range={range}/>}
        {page==='competitors' && <CompetitorsPage onComp={openComp} range={range}/>}
        {page==='competitor-profile' && compProfile && <CompetitorProfilePage comp={compProfile} onBack={backFromProfile} range={range}/>}
        {page==='intel' && <IntelPage range={range}/>}
        {page==='alerts' && <AlertsPage range={range}/>}
        {page==='reports' && <ReportsPage range={range}/>}
        {page==='settings' && <SettingsPage/>}
      </div>
      <MobNav page={page} nav={nav}/>
      {showAdd && <AddModal onClose={()=>setShowAdd(false)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
